# Hourly collector for the GitHub Pages POC.
# Polls SEC EDGAR + congressional datasets, and when new disclosures land,
# rebuilds docs/ and pushes — which redeploys Pages automatically.
# CERES_CONTACT is a repo secret (SEC wants contact info in the User-Agent).
name: poll
on:
  schedule:
    - cron: "23 * * * *" # hourly, off the top-of-hour rush
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Collect disclosures
        env:
          CERES_CONTACT: ${{ secrets.CERES_CONTACT }}
        run: npm run poll
      - name: Rebuild site and push if there are new disclosures
        run: |
          if git diff --quiet -- data/trades.ndjson data/alerts.ndjson; then
            echo "No new disclosures; skipping commit."
            exit 0
          fi
          node src/build-site.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git commit -m "poll: refresh disclosures ($(date -u +%FT%TZ))"
          git pull --rebase origin main
          git push
